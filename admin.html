<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>Socmegy - Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: #f5f0eb;
            padding: 16px;
            min-height: 100vh;
        }
        ::-webkit-scrollbar {
            display: none;
        }
        * {
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        /* ===== GLASS ===== */
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        /* ===== LOGIN ===== */
        .login-box {
            max-width: 380px;
            margin: 80px auto;
            padding: 36px 32px;
            text-align: center;
        }
        .login-box h1 {
            font-size: 1.6rem;
            margin-bottom: 4px;
            background: linear-gradient(135deg, #e8c96e, #d4a743);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .login-box .sub {
            color: #8a8a8a;
            font-size: 0.85rem;
            margin-bottom: 20px;
        }
        .login-box input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.04);
            color: #fff;
            font-size: 0.95rem;
            outline: none;
            font-family: inherit;
            margin-bottom: 12px;
        }
        .login-box input:focus {
            border-color: #d4a743;
        }
        .login-box button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #d4a743, #b8922f);
            color: #0a0a0a;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.3s;
        }
        .login-box button:hover {
            transform: scale(1.02);
        }
        .login-error {
            color: #ff6b6b;
            font-size: 0.85rem;
            margin-top: 10px;
        }

        /* ===== HEADER ===== */
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 20px;
            margin-bottom: 20px;
        }
        .admin-header h1 {
            font-size: 1.2rem;
            font-weight: 600;
            color: #d4a743;
        }
        .admin-header h1 i {
            color: #d4a743;
        }
        .admin-header .logout {
            background: none;
            border: none;
            color: #8a8a8a;
            cursor: pointer;
            font-size: 0.85rem;
            font-family: inherit;
            padding: 6px 14px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s;
        }
        .admin-header .logout:hover {
            color: #ff6b6b;
            border-color: rgba(255, 107, 107, 0.2);
        }

        /* ===== STATS ===== */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }
        .stat-box {
            padding: 14px 12px;
            text-align: center;
        }
        .stat-box .num {
            font-size: 1.6rem;
            font-weight: 700;
            color: #d4a743;
        }
        .stat-box .label {
            font-size: 0.7rem;
            color: #8a8a8a;
            margin-top: 2px;
        }

        /* ===== TABS ===== */
        .tabs {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            padding: 6px;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 14px;
        }
        .tabs button {
            background: none;
            border: none;
            padding: 8px 18px;
            border-radius: 30px;
            color: #8a8a8a;
            cursor: pointer;
            font-size: 0.8rem;
            font-family: inherit;
            font-weight: 500;
            transition: all 0.3s;
        }
        .tabs button:hover {
            color: #fff;
        }
        .tabs button.active {
            background: rgba(212, 167, 67, 0.12);
            color: #d4a743;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }

        /* ===== BUTTONS ===== */
        .btn-add {
            padding: 8px 20px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #d4a743, #b8922f);
            color: #0a0a0a;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            font-family: inherit;
            margin-bottom: 14px;
            transition: all 0.3s;
        }
        .btn-add:hover {
            transform: scale(1.02);
        }

        .btn-edit {
            background: rgba(212, 167, 67, 0.15);
            color: #d4a743;
        }
        .btn-edit:hover {
            background: rgba(212, 167, 67, 0.25);
        }
        .btn-toggle {
            background: rgba(81, 207, 102, 0.15);
            color: #51cf66;
        }
        .btn-toggle:hover {
            background: rgba(81, 207, 102, 0.25);
        }
        .btn-delete {
            background: rgba(255, 107, 107, 0.15);
            color: #ff6b6b;
        }
        .btn-delete:hover {
            background: rgba(255, 107, 107, 0.25);
        }
        .btn-pdf {
            background: rgba(255, 255, 255, 0.05);
            color: #f5f0eb;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        .btn-pdf:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        /* ===== PRODUCT CARDS ===== */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 14px;
        }
        .product-card {
            padding: 16px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 14px;
            transition: all 0.3s;
        }
        .product-card:hover {
            border-color: rgba(212, 167, 67, 0.12);
        }
        .product-card .badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 30px;
            font-size: 0.55rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .badge.available {
            background: rgba(81, 207, 102, 0.15);
            color: #51cf66;
        }
        .badge.not_available {
            background: rgba(255, 107, 107, 0.15);
            color: #ff6b6b;
        }
        .product-card .name {
            font-weight: 600;
            font-size: 1rem;
            margin: 4px 0 2px;
        }
        .product-card .desc {
            font-size: 0.8rem;
            color: #8a8a8a;
        }
        .product-card .price {
            font-size: 1.1rem;
            font-weight: 600;
            color: #d4a743;
            margin: 6px 0 10px;
        }
        .product-card .actions {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .product-card .actions button {
            padding: 4px 12px;
            border: none;
            border-radius: 8px;
            font-size: 0.65rem;
            cursor: pointer;
            font-family: inherit;
            font-weight: 500;
            transition: all 0.3s;
        }

        /* ===== ORDERS TABLE ===== */
        .order-wrap {
            overflow-x: auto;
            padding: 4px;
        }
        .order-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8rem;
            min-width: 600px;
        }
        .order-table th {
            text-align: left;
            padding: 10px 8px;
            color: #8a8a8a;
            font-weight: 500;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .order-table td {
            padding: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            vertical-align: middle;
        }
        .order-table .badge-status {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 30px;
            font-size: 0.55rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .badge-status.pending {
            background: rgba(255, 193, 7, 0.15);
            color: #ffc107;
        }
        .badge-status.completed {
            background: rgba(81, 207, 102, 0.15);
            color: #51cf66;
        }
        .badge-status.failed {
            background: rgba(255, 107, 107, 0.15);
            color: #ff6b6b;
        }
        .order-table select {
            padding: 4px 8px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.04);
            color: #fff;
            font-size: 0.7rem;
            font-family: inherit;
            cursor: pointer;
        }
        .order-table select option {
            background: #1a1a1a;
        }
        .order-table .action-btns {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
        }
        .order-table .action-btns button {
            padding: 3px 10px;
            border: none;
            border-radius: 6px;
            font-size: 0.6rem;
            cursor: pointer;
            font-family: inherit;
            font-weight: 500;
            transition: all 0.3s;
        }

        /* ===== LIST ITEMS (Testimoni & Gallery) ===== */
        .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 12px;
            margin-bottom: 6px;
            gap: 12px;
            flex-wrap: wrap;
        }
        .list-item .info {
            flex: 1;
            min-width: 120px;
        }
        .list-item .info .main {
            font-size: 0.9rem;
        }
        .list-item .info .sub {
            font-size: 0.75rem;
            color: #8a8a8a;
        }
        .list-item .actions {
            display: flex;
            gap: 6px;
        }
        .list-item .actions button {
            padding: 4px 10px;
            border: none;
            border-radius: 6px;
            font-size: 0.6rem;
            cursor: pointer;
            font-family: inherit;
            font-weight: 500;
            transition: all 0.3s;
        }
        .gallery-preview {
            width: 40px;
            height: 40px;
            border-radius: 6px;
            overflow: hidden;
            flex-shrink: 0;
            background: #161616;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }
        .gallery-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* ===== HERO SETTINGS ===== */
        .hero-settings {
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }
        .hero-settings .full {
            grid-column: 1 / -1;
        }
        .hero-settings label {
            font-size: 0.75rem;
            color: #8a8a8a;
            display: block;
            margin-bottom: 4px;
        }
        .hero-settings input,
        .hero-settings textarea {
            width: 100%;
            padding: 10px 14px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.04);
            color: #fff;
            font-size: 0.85rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.3s;
        }
        .hero-settings input:focus,
        .hero-settings textarea:focus {
            border-color: #d4a743;
        }
        .hero-settings textarea {
            min-height: 50px;
            resize: vertical;
        }

        /* ===== MODAL ===== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            z-index: 999;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal {
            background: rgba(20, 20, 20, 0.95);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 28px;
            max-width: 480px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal h2 {
            color: #d4a743;
            font-size: 1.2rem;
            margin-bottom: 18px;
        }
        .modal .form-group {
            margin-bottom: 14px;
        }
        .modal .form-group label {
            font-size: 0.75rem;
            color: #8a8a8a;
            display: block;
            margin-bottom: 4px;
        }
        .modal .form-group input,
        .modal .form-group select,
        .modal .form-group textarea {
            width: 100%;
            padding: 10px 14px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.04);
            color: #fff;
            font-size: 0.85rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.3s;
        }
        .modal .form-group input:focus,
        .modal .form-group select:focus,
        .modal .form-group textarea:focus {
            border-color: #d4a743;
        }
        .modal .form-group textarea {
            resize: vertical;
            min-height: 50px;
        }
        .modal .form-group select option {
            background: #1a1a1a;
        }
        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }
        .modal-actions button {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.3s;
        }
        .btn-save {
            background: linear-gradient(135deg, #d4a743, #b8922f);
            color: #0a0a0a;
            flex: 1;
        }
        .btn-save:hover {
            transform: scale(1.02);
        }
        .btn-cancel {
            background: rgba(255, 255, 255, 0.05);
            color: #8a8a8a;
        }
        .btn-cancel:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .loading {
            text-align: center;
            color: #8a8a8a;
            padding: 30px 0;
        }
        .loading i {
            font-size: 2rem;
            display: block;
            margin-bottom: 10px;
            opacity: 0.3;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            body {
                padding: 12px;
            }
            .hero-settings {
                grid-template-columns: 1fr;
            }
            .product-grid {
                grid-template-columns: 1fr 1fr;
            }
            .admin-header {
                flex-wrap: wrap;
                gap: 10px;
            }
            .tabs button {
                padding: 6px 12px;
                font-size: 0.7rem;
            }
            .stats {
                grid-template-columns: repeat(2, 1fr);
            }
            .stat-box .num {
                font-size: 1.3rem;
            }
            .order-table {
                font-size: 0.7rem;
                min-width: 480px;
            }
            .order-table th,
            .order-table td {
                padding: 6px 4px;
            }
            .login-box {
                margin: 40px auto;
                padding: 28px 20px;
            }
            .modal {
                padding: 20px;
            }
        }

        @media (max-width: 480px) {
            .product-grid {
                grid-template-columns: 1fr;
            }
            .stats {
                grid-template-columns: 1fr 1fr;
                gap: 8px;
            }
            .stat-box {
                padding: 10px;
            }
            .stat-box .num {
                font-size: 1.1rem;
            }
            .list-item {
                flex-direction: column;
                align-items: stretch;
            }
            .list-item .actions {
                justify-content: flex-end;
            }
            .login-box h1 {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- ===== LOGIN ===== -->
        <div id="loginScreen" class="login-box glass">
            <h1>Socmegy</h1>
            <p class="sub">Handling</p>
            <input type="password" id="adminPassword" placeholder="Enter password" />
            <button onclick="login()">Login</button>
            <div id="loginError" class="login-error"></div>
        </div>

        <!-- ===== ADMIN PANEL ===== -->
        <div id="adminPanel" style="display:none;">

            <!-- Header -->
            <div class="admin-header glass">
                <h1><i class="fas fa-crown"></i>Socmegy</h1>
                <button class="logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>

            <!-- Stats -->
            <div class="stats" id="statsGrid">
                <div class="stat-box glass"><div class="num" id="totalProducts">0</div><div class="label">Products</div></div>
                <div class="stat-box glass"><div class="num" id="totalOrders">0</div><div class="label">Orders</div></div>
                <div class="stat-box glass"><div class="num" id="pendingOrders">0</div><div class="label">Pending</div></div>
                <div class="stat-box glass"><div class="num" id="completedOrders">0</div><div class="label">Completed</div></div>
            </div>

            <!-- Tabs -->
            <div class="tabs glass">
                <button class="active" data-tab="hero" onclick="switchTab('hero')"><i class="fas fa-image"></i> Hero</button>
                <button data-tab="products" onclick="switchTab('products')"><i class="fas fa-box"></i> Products</button>
                <button data-tab="testimonials" onclick="switchTab('testimonials')"><i class="fas fa-quote-left"></i> Testimonials</button>
                <button data-tab="gallery" onclick="switchTab('gallery')"><i class="fas fa-images"></i> Gallery</button>
                <button data-tab="orders" onclick="switchTab('orders')"><i class="fas fa-list"></i> Orders</button>
            </div>

            <!-- Tab: Hero -->
            <div id="tabHero" class="tab-content active">
                <div class="hero-settings glass">
                    <div class="full"><label>Hero Image URL</label><input type="text" id="heroImage" placeholder="https://..." /></div>
                    <div class="full"><label>Hero Title</label><input type="text" id="heroTitle" placeholder="Elevate Your Digital Presence" /></div>
                    <div class="full"><label>Hero Subtitle</label><textarea id="heroSubtitle" rows="2" placeholder="Real followers, real engagement..."></textarea></div>
                    <div class="full"><label>CTA Button Text</label><input type="text" id="heroCta" placeholder="Explore Services" /></div>
                    <div class="full"><button class="btn-add" onclick="saveHero()"><i class="fas fa-save"></i> Save Hero</button></div>
                </div>
            </div>

            <!-- Tab: Products -->
            <div id="tabProducts" class="tab-content">
                <button class="btn-add" onclick="openModal('product')"><i class="fas fa-plus"></i> Add Product</button>
                <div class="product-grid" id="productGrid"></div>
            </div>

            <!-- Tab: Testimonials -->
            <div id="tabTestimonials" class="tab-content">
                <button class="btn-add" onclick="openModal('testimonial')"><i class="fas fa-plus"></i> Add Testimonial</button>
                <div id="testimonialList"></div>
            </div>

            <!-- Tab: Gallery -->
            <div id="tabGallery" class="tab-content">
                <button class="btn-add" onclick="openModal('gallery')"><i class="fas fa-plus"></i> Add Image</button>
                <div id="galleryList"></div>
            </div>

            <!-- Tab: Orders -->
            <div id="tabOrders" class="tab-content">
                <div id="orderList"></div>
            </div>

        </div>
    </div>

    <!-- ===== MODAL ===== -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal glass">
            <h2 id="modalTitle">Add</h2>
            <form id="modalForm" onsubmit="saveModal(event)">
                <input type="hidden" id="modalType" />
                <input type="hidden" id="editIndex" />
                <div id="modalFields"></div>
                <div class="modal-actions">
                    <button type="submit" class="btn-save">Save</button>
                    <button type="button" class="btn-cancel" onclick="closeModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // ============================================================
        // CONFIG
        // ============================================================
        const WORKER_URL = 'https://socmegy-worker.socmegy.workers.dev';
        const ADMIN_PASSWORD = 'socmegy2026';
        const AUTH_TOKEN = 'Bearer socmegy2026';

        // ============================================================
        // STATE
        // ============================================================
        let products = [];
        let orders = [];
        let testimonials = [];
        let gallery = [];

        // ============================================================
        // LOGIN
        // ============================================================
        function login() {
            const pwd = document.getElementById('adminPassword').value;
            if (pwd === ADMIN_PASSWORD) {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                document.getElementById('loginError').textContent = '';
                loadAll();
            } else {
                document.getElementById('loginError').textContent = 'Wrong password!';
            }
        }

        function logout() {
            document.getElementById('loginScreen').style.display = 'block';
            document.getElementById('adminPanel').style.display = 'none';
            document.getElementById('adminPassword').value = '';
        }

        document.getElementById('adminPassword').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') login();
        });

        // ============================================================
        // TABS
        // ============================================================
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tabs button').forEach(el => el.classList.remove('active'));
            document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');
            document.querySelector(`.tabs button[data-tab="${tab}"]`).classList.add('active');
            if (tab === 'orders') loadOrders();
            if (tab === 'testimonials') loadTestimonials();
            if (tab === 'gallery') loadGallery();
        }

        // ============================================================
        // LOAD ALL
        // ============================================================
        async function loadAll() {
            await Promise.all([loadProducts(), loadOrders(), loadTestimonials(), loadGallery(), loadHero()]);
            updateStats();
        }

        // ============================================================
        // HERO (localStorage)
        // ============================================================
        function loadHero() {
            const saved = localStorage.getItem('socmegy_hero');
            if (saved) {
                const h = JSON.parse(saved);
                document.getElementById('heroImage').value = h.image || '';
                document.getElementById('heroTitle').value = h.title || 'Elevate Your Digital Presence';
                document.getElementById('heroSubtitle').value = h.subtitle || 'Real followers, real engagement. Premium social media growth services.';
                document.getElementById('heroCta').value = h.cta || 'Explore Services';
            }
        }

        function saveHero() {
            const hero = {
                image: document.getElementById('heroImage').value,
                title: document.getElementById('heroTitle').value,
                subtitle: document.getElementById('heroSubtitle').value,
                cta: document.getElementById('heroCta').value
            };
            localStorage.setItem('socmegy_hero', JSON.stringify(hero));
            alert('✅ Hero saved!');
        }

        // ============================================================
        // PRODUCTS
        // ============================================================
        async function loadProducts() {
            try {
                const res = await fetch(`${WORKER_URL}/api/products`);
                products = await res.json();
                renderProducts();
            } catch (e) {
                document.getElementById('productGrid').innerHTML = '<div class="loading"><i class="fas fa-exclamation-triangle"></i> Failed to load</div>';
            }
        }

        function renderProducts() {
            const grid = document.getElementById('productGrid');
            if (!products.length) {
                grid.innerHTML = '<div class="loading"><i class="fas fa-box-open"></i> No products</div>';
                return;
            }
            grid.innerHTML = products.map(p => `
                <div class="product-card glass">
                    <span class="badge ${p.status || 'available'}">${p.status || 'available'}</span>
                    <div class="name"><i class="${p.icon || 'fa-solid fa-box'}"></i> ${p.name}</div>
                    <div class="desc">${p.desc}</div>
                    <div class="price">RM${p.price.toFixed(2)}</div>
                    <div class="actions">
                        <button class="btn-edit" onclick="editProduct(${p.id})"><i class="fas fa-edit"></i> Edit</button>
                        <button class="btn-toggle" onclick="toggleStatus(${p.id})">
                            <i class="fas fa-${p.status === 'available' ? 'pause' : 'play'}"></i>
                            ${p.status === 'available' ? 'Set Off' : 'Set On'}
                        </button>
                        <button class="btn-delete" onclick="deleteProduct(${p.id})"><i class="fas fa-trash"></i> Del</button>
                    </div>
                </div>
            `).join('');
        }

        async function toggleStatus(id) {
            const p = products.find(x => x.id === id);
            if (!p) return;
            const newStatus = p.status === 'available' ? 'not_available' : 'available';
            try {
                await fetch(`${WORKER_URL}/api/admin/product`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': AUTH_TOKEN },
                    body: JSON.stringify({ ...p, status: newStatus })
                });
                await loadProducts();
                updateStats();
            } catch (e) { alert('Error: ' + e.message); }
        }

        async function deleteProduct(id) {
            if (!confirm('Delete?')) return;
            try {
                await fetch(`${WORKER_URL}/api/admin/product?id=${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': AUTH_TOKEN }
                });
                await loadProducts();
                updateStats();
            } catch (e) { alert('Error: ' + e.message); }
        }

        function editProduct(id) {
            const p = products.find(x => x.id === id);
            if (!p) return;
            openModal('product', p);
        }

        // ============================================================
        // TESTIMONIALS (localStorage)
        // ============================================================
        function loadTestimonials() {
            const saved = localStorage.getItem('socmegy_testimonials');
            testimonials = saved ? JSON.parse(saved) : [
                { name: 'Aina R.', text: 'Super fast service! Very satisfied!', stars: 5 },
                { name: 'Farid Z.', text: 'Quality followers, real engagement. Highly recommended!', stars: 5 }
            ];
            renderTestimonials();
        }

        function renderTestimonials() {
            const container = document.getElementById('testimonialList');
            if (!testimonials.length) {
                container.innerHTML = '<div class="loading"><i class="fas fa-comment"></i> No testimonials</div>';
                return;
            }
            container.innerHTML = testimonials.map((t, i) => `
                <div class="list-item glass">
                    <div class="info">
                        <div class="main">"${t.text}"</div>
                        <div class="sub">${t.name} • ${'★'.repeat(t.stars)}${'☆'.repeat(5 - t.stars)}</div>
                    </div>
                    <div class="actions">
                        <button class="btn-edit" onclick="editTestimonial(${i})"><i class="fas fa-edit"></i></button>
                        <button class="btn-delete" onclick="deleteTestimonial(${i})"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
            `).join('');
        }

        function deleteTestimonial(i) {
            if (!confirm('Delete?')) return;
            testimonials.splice(i, 1);
            localStorage.setItem('socmegy_testimonials', JSON.stringify(testimonials));
            renderTestimonials();
        }

        function editTestimonial(i) {
            openModal('testimonial', testimonials[i], i);
        }

        // ============================================================
        // GALLERY (localStorage)
        // ============================================================
        function loadGallery() {
            const saved = localStorage.getItem('socmegy_gallery');
            gallery = saved ? JSON.parse(saved) : [
                { src: 'https://picsum.photos/seed/g1/400/400', category: 'TikTok' },
                { src: 'https://picsum.photos/seed/g2/400/400', category: 'Instagram' }
            ];
            renderGallery();
        }

        function renderGallery() {
            const container = document.getElementById('galleryList');
            if (!gallery.length) {
                container.innerHTML = '<div class="loading"><i class="fas fa-images"></i> No images</div>';
                return;
            }
            container.innerHTML = gallery.map((g, i) => `
                <div class="list-item glass">
                    <div style="display:flex;align-items:center;gap:12px;flex:1;">
                        <div class="gallery-preview"><img src="${g.src}" alt="${g.category}" onerror="this.parentElement.innerHTML='<i class=\\'fas fa-image\\' style=\\'color:#666;font-size:1.2rem;display:flex;align-items:center;justify-content:center;height:100%;\\'></i>'" /></div>
                        <div>
                            <div class="main"><strong>${g.category}</strong></div>
                            <div class="sub" style="font-size:0.7rem;color:#8a8a8a;word-break:break-all;">${g.src.substring(0, 40)}${g.src.length > 40 ? '...' : ''}</div>
                        </div>
                    </div>
                    <div class="actions">
                        <button class="btn-edit" onclick="editGallery(${i})"><i class="fas fa-edit"></i></button>
                        <button class="btn-delete" onclick="deleteGallery(${i})"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
            `).join('');
        }

        function deleteGallery(i) {
            if (!confirm('Delete?')) return;
            gallery.splice(i, 1);
            localStorage.setItem('socmegy_gallery', JSON.stringify(gallery));
            renderGallery();
        }

        function editGallery(i) {
            openModal('gallery', gallery[i], i);
        }

        // ============================================================
        // ORDERS
        // ============================================================
        async function loadOrders() {
            try {
                const res = await fetch(`${WORKER_URL}/api/admin/orders`, {
                    headers: { 'Authorization': AUTH_TOKEN }
                });
                if (!res.ok) throw new Error('Unauthorized');
                orders = await res.json();
                renderOrders();
            } catch (e) {
                document.getElementById('orderList').innerHTML = '<div class="loading"><i class="fas fa-exclamation-triangle"></i> Failed to load orders</div>';
            }
        }

        function renderOrders() {
            const container = document.getElementById('orderList');
            if (!orders.length) {
                container.innerHTML = '<div class="loading"><i class="fas fa-box-open"></i> No orders</div>';
                return;
            }
            container.innerHTML = `
                <div class="order-wrap glass">
                    <table class="order-table">
                        <thead>
                            <tr>
                                <th>Order</th>
                                <th>Customer</th>
                                <th>Items</th>
                                <th>Total</th>
                                <th>Status</th>
                                <th>Note</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${orders.map(o => `
                                <tr>
                                    <td><small>${o.orderId}</small></td>
                                    <td>
                                        <strong>${o.customer.name}</strong><br/>
                                        <small style="color:#8a8a8a;">${o.customer.email}</small><br/>
                                        <small style="color:#8a8a8a;">${o.customer.phone}</small>
                                    </td>
                                    <td>${o.items.map(i => `${i.name} x${i.qty}`).join('<br/>')}</td>
                                    <td><strong>RM${o.total.toFixed(2)}</strong></td>
                                    <td><span class="badge-status ${o.status}">${o.status}</span></td>
                                    <td><small style="color:#8a8a8a;">${o.note || '-'}</small></td>
                                    <td>
                                        <div class="action-btns">
                                            <select onchange="updateStatus('${o.orderId}', this.value)">
                                                <option value="pending" ${o.status === 'pending' ? 'selected' : ''}>Pending</option>
                                                <option value="completed" ${o.status === 'completed' ? 'selected' : ''}>Completed</option>
                                                <option value="failed" ${o.status === 'failed' ? 'selected' : ''}>Failed</option>

                                            <button class="btn-pdf" onclick="exportPDF('${o.orderId}')"><i class="fas fa-file-pdf"></i> PDF</button>
                                        </div>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        async function updateStatus(orderId, status) {
            try {
                await fetch(`${WORKER_URL}/api/admin/order/status`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': AUTH_TOKEN },
                    body: JSON.stringify({ orderId, status })
                });
                await loadOrders();
                updateStats();
            } catch (e) { alert('Error: ' + e.message); }
        }

        // ============================================================
        // UPDATE STATS
        // ============================================================
        function updateStats() {
            document.getElementById('totalProducts').textContent = products.length;
            document.getElementById('totalOrders').textContent = orders.length;
            document.getElementById('pendingOrders').textContent = orders.filter(o => o.status === 'pending').length;
            document.getElementById('completedOrders').textContent = orders.filter(o => o.status === 'completed').length;
        }

        // ============================================================
        // MODAL SYSTEM
        // ============================================================
        function openModal(type, data, index) {
            document.getElementById('modalType').value = type;
            document.getElementById('editIndex').value = index !== undefined ? index : '';
            document.getElementById('modalTitle').textContent = (data ? 'Edit' : 'Add') + ' ' + type.charAt(0).toUpperCase() + type.slice(1);

            let fields = '';
            if (type === 'product') {
                const p = data || {};
                fields = `
                    <div class="form-group"><label>Name</label><input type="text" id="fName" value="${p.name || ''}" required /></div>
                    <div class="form-group"><label>Description</label><input type="text" id="fDesc" value="${p.desc || ''}" required /></div>
                    <div class="form-group"><label>Price (RM)</label><input type="number" id="fPrice" value="${p.price || ''}" step="0.01" required /></div>
                    <div class="form-group"><label>Icon</label><input type="text" id="fIcon" value="${p.icon || 'fa-solid fa-box'}" /></div>
                    <div class="form-group"><label>Status</label>
                        <select id="fStatus"><option value="available" ${p.status === 'available' ? 'selected' : ''}>Available</option><option value="not_available" ${p.status === 'not_available' ? 'selected' : ''}>Not Available</option></select>
                    </div>
                `;
            } else if (type === 'testimonial') {
                const t = data || {};
                fields = `
                    <div class="form-group"><label>Name</label><input type="text" id="fName" value="${t.name || ''}" required /></div>
                    <div class="form-group"><label>Text</label><textarea id="fText" rows="2" required>${t.text || ''}</textarea></div>
                    <div class="form-group"><label>Stars</label>
                        <select id="fStars">
                            <option value="5" ${t.stars === 5 ? 'selected' : ''}>★★★★★</option>
                            <option value="4" ${t.stars === 4 ? 'selected' : ''}>★★★★☆</option>
                            <option value="3" ${t.stars === 3 ? 'selected' : ''}>★★★☆☆</option>
                            <option value="2" ${t.stars === 2 ? 'selected' : ''}>★★☆☆☆</option>
                            <option value="1" ${t.stars === 1 ? 'selected' : ''}>★☆☆☆☆</option>
                        </select>
                    </div>
                `;
            } else if (type === 'gallery') {
                const g = data || {};
                fields = `
                    <div class="form-group"><label>Image URL</label><input type="url" id="fSrc" value="${g.src || ''}" required /></div>
                    <div class="form-group"><label>Category</label>
                        <select id="fCategory">
                            <option value="TikTok" ${g.category === 'TikTok' ? 'selected' : ''}>TikTok</option>
                            <option value="Instagram" ${g.category === 'Instagram' ? 'selected' : ''}>Instagram</option>
                            <option value="YouTube" ${g.category === 'YouTube' ? 'selected' : ''}>YouTube</option>
                            <option value="Others" ${g.category === 'Others' ? 'selected' : ''}>Others</option>
                        </select>
                    </div>
                `;
            }
            document.getElementById('modalFields').innerHTML = fields;
            document.getElementById('modalOverlay').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('active');
        }

        async function saveModal(e) {
            e.preventDefault();
            const type = document.getElementById('modalType').value;
            const editIndex = document.getElementById('editIndex').value;

            try {
                if (type === 'product') {
                    const id = editIndex ? parseInt(editIndex) : Math.max(...products.map(p => p.id), 0) + 1;
                    const name = document.getElementById('fName').value.trim();
                    const desc = document.getElementById('fDesc').value.trim();
                    const price = parseFloat(document.getElementById('fPrice').value);
                    const icon = document.getElementById('fIcon').value.trim() || 'fa-solid fa-box';
                    const status = document.getElementById('fStatus').value;
                    if (!name || !desc || isNaN(price)) { alert('Please fill all fields'); return; }
                    await fetch(`${WORKER_URL}/api/admin/product`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': AUTH_TOKEN },
                        body: JSON.stringify({ id, name, desc, price, icon, status })
                    });
                    await loadProducts();
                    updateStats();
                } else if (type === 'testimonial') {
                    const name = document.getElementById('fName').value.trim();
                    const text = document.getElementById('fText').value.trim();
                    const stars = parseInt(document.getElementById('fStars').value);
                    if (!name || !text) { alert('Please fill all fields'); return; }
                    const item = { name, text, stars };
                    if (editIndex !== '') {
                        testimonials[parseInt(editIndex)] = item;
                    } else {
                        testimonials.push(item);
                    }
                    localStorage.setItem('socmegy_testimonials', JSON.stringify(testimonials));
                    renderTestimonials();
                } else if (type === 'gallery') {
                    const src = document.getElementById('fSrc').value.trim();
                    const category = document.getElementById('fCategory').value;
                    if (!src) { alert('Please enter image URL'); return; }
                    const item = { src, category };
                    if (editIndex !== '') {
                        gallery[parseInt(editIndex)] = item;
                    } else {
                        gallery.push(item);
                    }
                    localStorage.setItem('socmegy_gallery', JSON.stringify(gallery));
                    renderGallery();
                }
                closeModal();
            } catch (err) {
                alert('Error: ' + err.message);
            }
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });

        // ============================================================
        // INIT
        // ============================================================
        // Seed default data if empty
        if (!localStorage.getItem('socmegy_testimonials')) {
            localStorage.setItem('socmegy_testimonials', JSON.stringify([
                { name: 'Aina R.', text: 'Super fast service! Followers started coming in within 2 hours. Very satisfied!', stars: 5 },
                { name: 'Farid Z.', text: 'Quality followers with real engagement. My account growth has been incredible. Highly recommended!', stars: 5 },
                { name: 'Sarah H.', text: 'Affordable pricing and excellent customer support. They really care about their clients.', stars: 4 },
                { name: 'Adam B.', text: 'My Instagram blew up after using Socmegy. Best investment I\'ve made for my brand.', stars: 5 }
            ]));
        }
        if (!localStorage.getItem('socmegy_gallery')) {
            localStorage.setItem('socmegy_gallery', JSON.stringify([
                { src: 'https://picsum.photos/seed/g1/400/400', category: 'TikTok' },
                { src: 'https://picsum.photos/seed/g2/400/400', category: 'TikTok' },
                { src: 'https://picsum.photos/seed/g3/400/400', category: 'TikTok' },
                { src: 'https://picsum.photos/seed/g4/400/400', category: 'Instagram' },
                { src: 'https://picsum.photos/seed/g5/400/400', category: 'Instagram' },
                { src: 'https://picsum.photos/seed/g6/400/400', category: 'Instagram' }
            ]));
        }

        console.log('✨ Socmegy Admin — Simplified');
        console.log('🔑 Password: socmegy2026');
        console.log('📌 PDF uses logo.png');
    </script>
